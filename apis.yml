description: >-
  The U.S. Energy Information Administration (EIA) is committed to its free and
  open data by making it available through an Application Programming Interface
  (API) and its open data tools. The EIA Open Data API v2 is multi-faceted and
  contains time-series datasets organized by the main energy categories,
  including electricity, natural gas, petroleum, coal, nuclear, renewables,
  total energy, international energy statistics, the State Energy Data System
  (SEDS), and CO2 emissions aggregates.
