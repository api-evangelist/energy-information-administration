naftiko: 1.0.0-alpha2
info:
  label: U.S. Energy Information Administration Open Data API — Natural Gas
  description: 'U.S. Energy Information Administration Open Data API — Natural Gas. 2 operations. Lead operation: List natural
    gas child routes. Self-contained Naftiko capability covering one Energy Information Administration business surface.'
  tags:
  - Energy Information Administration
  - Natural Gas
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENERGY_INFORMATION_ADMINISTRATION_API_KEY: ENERGY_INFORMATION_ADMINISTRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-data-natural-gas
    baseUri: https://api.eia.gov/v2
    description: U.S. Energy Information Administration Open Data API — Natural Gas business capability. Self-contained, no
      shared references.
    resources:
    - name: natural-gas
      path: /natural-gas
      operations:
      - name: getnaturalgasroutes
        method: GET
        description: List natural gas child routes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: natural-gas-pri-sum-data
      path: /natural-gas/pri/sum/data
      operations:
      - name: getnaturalgaspricesummary
        method: GET
        description: Query natural gas price summary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api_key
      value: '{{env.ENERGY_INFORMATION_ADMINISTRATION_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: open-data-natural-gas-rest
    port: 8080
    description: REST adapter for U.S. Energy Information Administration Open Data API — Natural Gas. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/natural-gas
      name: natural-gas
      description: REST surface for natural-gas.
      operations:
      - method: GET
        name: getnaturalgasroutes
        description: List natural gas child routes
        call: open-data-natural-gas.getnaturalgasroutes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/natural-gas/pri/sum/data
      name: natural-gas-pri-sum-data
      description: REST surface for natural-gas-pri-sum-data.
      operations:
      - method: GET
        name: getnaturalgaspricesummary
        description: Query natural gas price summary
        call: open-data-natural-gas.getnaturalgaspricesummary
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-data-natural-gas-mcp
    port: 9090
    transport: http
    description: MCP adapter for U.S. Energy Information Administration Open Data API — Natural Gas. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: list-natural-gas-child-routes
      description: List natural gas child routes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-data-natural-gas.getnaturalgasroutes
      outputParameters:
      - type: object
        mapping: $.
    - name: query-natural-gas-price-summary
      description: Query natural gas price summary
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-data-natural-gas.getnaturalgaspricesummary
      outputParameters:
      - type: object
        mapping: $.
