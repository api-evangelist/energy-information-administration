naftiko: 1.0.0-alpha2
info:
  label: U.S. Energy Information Administration Open Data API — CO2 Emissions
  description: 'U.S. Energy Information Administration Open Data API — CO2 Emissions. 1 operations. Lead operation: Query
    CO2 emissions aggregates. Self-contained Naftiko capability covering one Energy Information Administration business surface.'
  tags:
  - Energy Information Administration
  - CO2 Emissions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENERGY_INFORMATION_ADMINISTRATION_API_KEY: ENERGY_INFORMATION_ADMINISTRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-data-co2-emissions
    baseUri: https://api.eia.gov/v2
    description: U.S. Energy Information Administration Open Data API — CO2 Emissions business capability. Self-contained,
      no shared references.
    resources:
    - name: co2-emissions-co2-emissions-aggregates-data
      path: /co2-emissions/co2-emissions-aggregates/data
      operations:
      - name: getco2emissionsaggregates
        method: GET
        description: Query CO2 emissions aggregates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api_key
      value: '{{env.ENERGY_INFORMATION_ADMINISTRATION_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: open-data-co2-emissions-rest
    port: 8080
    description: REST adapter for U.S. Energy Information Administration Open Data API — CO2 Emissions. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/co2-emissions/co2-emissions-aggregates/data
      name: co2-emissions-co2-emissions-aggregates-data
      description: REST surface for co2-emissions-co2-emissions-aggregates-data.
      operations:
      - method: GET
        name: getco2emissionsaggregates
        description: Query CO2 emissions aggregates
        call: open-data-co2-emissions.getco2emissionsaggregates
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-data-co2-emissions-mcp
    port: 9090
    transport: http
    description: MCP adapter for U.S. Energy Information Administration Open Data API — CO2 Emissions. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: query-co2-emissions-aggregates
      description: Query CO2 emissions aggregates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-data-co2-emissions.getco2emissionsaggregates
      outputParameters:
      - type: object
        mapping: $.
