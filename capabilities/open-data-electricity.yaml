naftiko: 1.0.0-alpha2
info:
  label: U.S. Energy Information Administration Open Data API — Electricity
  description: 'U.S. Energy Information Administration Open Data API — Electricity. 2 operations. Lead operation: List electricity
    child routes. Self-contained Naftiko capability covering one Energy Information Administration business surface.'
  tags:
  - Energy Information Administration
  - Electricity
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENERGY_INFORMATION_ADMINISTRATION_API_KEY: ENERGY_INFORMATION_ADMINISTRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-data-electricity
    baseUri: https://api.eia.gov/v2
    description: U.S. Energy Information Administration Open Data API — Electricity business capability. Self-contained, no
      shared references.
    resources:
    - name: electricity
      path: /electricity
      operations:
      - name: getelectricityroutes
        method: GET
        description: List electricity child routes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: electricity-retail-sales-data
      path: /electricity/retail-sales/data
      operations:
      - name: getelectricityretailsales
        method: GET
        description: Query electricity retail sales time series
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api_key
      value: '{{env.ENERGY_INFORMATION_ADMINISTRATION_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: open-data-electricity-rest
    port: 8080
    description: REST adapter for U.S. Energy Information Administration Open Data API — Electricity. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/electricity
      name: electricity
      description: REST surface for electricity.
      operations:
      - method: GET
        name: getelectricityroutes
        description: List electricity child routes
        call: open-data-electricity.getelectricityroutes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/electricity/retail-sales/data
      name: electricity-retail-sales-data
      description: REST surface for electricity-retail-sales-data.
      operations:
      - method: GET
        name: getelectricityretailsales
        description: Query electricity retail sales time series
        call: open-data-electricity.getelectricityretailsales
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-data-electricity-mcp
    port: 9090
    transport: http
    description: MCP adapter for U.S. Energy Information Administration Open Data API — Electricity. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: list-electricity-child-routes
      description: List electricity child routes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-data-electricity.getelectricityroutes
      outputParameters:
      - type: object
        mapping: $.
    - name: query-electricity-retail-sales-time
      description: Query electricity retail sales time series
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-data-electricity.getelectricityretailsales
      outputParameters:
      - type: object
        mapping: $.
